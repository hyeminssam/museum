<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0">
    <title>인터랙티브 디지털 학습지 & 교사용 통합 채점 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; -webkit-text-size-adjust: none; }
        
        .pdf-page-container { position: relative; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); background: white; border-radius: 0.5rem; overflow: hidden; display: block; clear: both; }
        .overlay-element { position: absolute; border: 2px dashed #4f46e5; background: rgba(79, 70, 229, 0.05); cursor: move; box-sizing: border-box; }
        .student-element { position: absolute; box-sizing: border-box; }
        
        .student-text { border: 1px solid #cbd5e1; background: rgba(255,255,255,0.95); border-radius: 0.25rem; padding: 4px; font-size: 14px; width:100%; height:100%; outline:none; }
        .student-text:focus { border-color:#4f46e5; background: #fff; }
        
        .student-textarea { border: 1px solid #cbd5e1; background: rgba(255,255,255,0.95); border-radius: 0.25rem; padding: 4px 6px; font-size: 13px; line-height: 1.3; width:100%; height:100%; resize:none; outline:none; }
        .student-textarea:focus { border-color:#4f46e5; background: #fff; }
        
        .student-canvas-container { position: relative; width: 100%; height: 100%; background: rgba(255,255,255,0.95); border: 1px solid #94a3b8; border-radius: 0.375rem; overflow: hidden; display: flex; flex-direction: column; }
        .canvas-toolbar { display: flex; flex-direction: column; bg: #f8fafc; padding: 4px 6px; border-bottom: 1px solid #cbd5e1; z-index: 5; shrink-0; gap: 4px; }
        
        .student-canvas { cursor: crosshair; flex-grow: 1; width: 100%; height: 100%; background: transparent; touch-action: none; }
        .resize-handle { position: absolute; width: 14px; height: 14px; background: #4f46e5; right: -7px; bottom: -7px; cursor: se-resize; border-radius: 50%; z-index: 20; }
        
        .pdf-scroller { width: 100%; overflow: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; align-items: center; }
        
        .color-pick-btn { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.1s; }
        .color-pick-btn:hover { transform: scale(1.15); }
        .color-pick-btn.active { ring: 2px offset 1px; ring-color: #4f46e5; transform: scale(1.1); }
        
        .viewer-text { border: 1px solid #6366f1; background: #e0e7ff; color: #1e1b4b; font-weight: bold; border-radius: 0.25rem; padding: 4px; font-size: 14px; width:100%; height:100%; overflow: hidden; text-overflow: ellipsis; }
        .viewer-textarea { border: 1px solid #6366f1; background: #e0e7ff; color: #1e1b4b; font-weight: bold; border-radius: 0.25rem; padding: 4px 6px; font-size: 13px; line-height: 1.3; width:100%; height:100%; overflow-y:auto; resize:none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-indigo-900 text-white px-4 py-3 shadow-md flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-graduation-cap text-xl text-emerald-400"></i>
            <h1 class="text-sm md:text-base font-bold tracking-tight">스마트 디지털 교사용 통합 학습 시스템</h1>
        </div>
        <div class="flex items-center space-x-2">
            <span id="badge-mode" class="px-2.5 py-0.5 rounded-full text-[11px] font-bold bg-emerald-500 text-white"><i class="fa-solid fa-user-graduate mr-1"></i>학생 모드</span>
            <button id="btn-exit-teacher" class="hidden px-2 py-0.5 bg-red-600 hover:bg-red-700 text-white text-[11px] font-medium rounded" onclick="exitTeacherMode()">편집 종료</button>
        </div>
    </header>

    <div class="flex-grow flex flex-col lg:flex-row">
        <aside class="w-full lg:w-72 bg-white border-b lg:border-b-0 lg:border-r border-slate-200 p-4 flex flex-col space-y-4 shrink-0">
            
            <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 shadow-sm">
                <label class="block text-xs font-bold text-slate-700 mb-1.5"><i class="fa-solid fa-people-group mr-1 text-indigo-600"></i> 소속 조 선택</label>
                <select id="select-team" onchange="handleTeamChange()" class="w-full px-2.5 py-1.5 border rounded-lg text-xs bg-white font-semibold text-slate-800 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="1">제 1 조 학습지</option>
                    <option value="2">제 2 조 학습지</option>
                    <option value="3">제 3 조 학습지</option>
                    <option value="4">제 4 조 학습지</option>
                </select>
            </div>

            <div id="panel-teacher" class="hidden space-y-4 bg-indigo-50/50 p-3 rounded-xl border border-indigo-100">
                <div class="text-center font-bold text-xs text-indigo-800 border-b pb-1.5 mb-1">🔒 교사 전용 관리자 메뉴</div>
                
                <div class="bg-white p-2 rounded-lg border border-indigo-200 shadow-inner space-y-2">
                    <label class="block text-[11px] font-bold text-indigo-900"><i class="fa-solid fa-clipboard-check mr-1 text-emerald-500"></i> 📢 학생 제출 답안 채점</label>
                    <button onclick="fetchStudentSubmissions()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] font-bold py-1.5 rounded shadow">
                         구글 시트에서 제출 현황 불러오기
                    </button>
                    <select id="select-student-submission" onchange="loadStudentResponseToCanvas()" class="w-full px-2 py-1 border rounded text-[11px] bg-slate-50 outline-none font-medium">
                        <option value="">-- 제출 학생 선택 --</option>
                    </select>
                    <button id="btn-clear-view" onclick="clearStudentViewMode()" class="hidden w-full bg-slate-500 hover:bg-slate-600 text-white text-[10px] py-1 rounded">
                         채점 종료 (답안 보기 해제)
                    </button>
                </div>

                <div class="border-t pt-2">
                    <h2 class="text-[11px] font-bold text-slate-500 uppercase mb-1">문항 배치 도구 선택 후 도화지 클릭</h2>
                    <div class="grid grid-cols-3 gap-1">
                        <button onclick="setTool('text')" id="tool-text" class="py-2 px-1 border rounded text-center text-[11px] font-medium bg-indigo-50 border-indigo-500 ring-2 ring-indigo-200">단답형</button>
                        <button onclick="setTool('textarea')" id="tool-textarea" class="py-2 px-1 border rounded text-center text-[11px] font-medium bg-slate-50">서술형</button>
                        <button onclick="setTool('multimedia')" id="tool-multimedia" class="py-2 px-1 border rounded text-center text-[11px] font-medium bg-slate-50">그림판</button>
                    </div>
                </div>
                <div class="border-t pt-2 grid grid-cols-2 gap-1">
                    <button onclick="exportBlueprint()" class="bg-slate-800 text-white py-1.5 rounded text-[10px] font-medium hover:bg-slate-900">구조 복사</button>
                    <button onclick="importBlueprint()" class="bg-slate-100 text-slate-700 py-1.5 rounded text-[10px] font-medium hover:bg-slate-200">구조 로드</button>
                </div>
            </div>

            <div id="panel-student" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-700 mb-0.5">학번 (5자리)</label>
                        <input type="text" id="student-id" placeholder="예: 10203" class="w-full px-2 py-1.5 border rounded text-xs outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-700 mb-0.5">이름</label>
                        <input type="text" id="student-name" placeholder="홍길동" class="w-full px-2 py-1.5 border rounded text-xs outline-none">
                    </div>
                </div>
                <div class="pt-2 border-t">
                    <button id="btn-submit" onclick="submitWorksheet()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-lg shadow flex items-center justify-center text-xs">
                        <i class="fa-solid fa-paper-plane mr-1.5"></i>구글 시트로 답안 제출하기
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-grow p-3 md:p-6 overflow-auto max-h-[calc(100vh-53px)] pdf-scroller">
            <div id="pdf-container" class="w-full flex flex-col items-center">
                <div class="bg-white p-6 rounded-xl border text-center text-slate-400 mt-6 text-xs">학습지를 불러오는 중입니다...</div>
            </div>
        </main>
    </div>

    <div class="fixed bottom-1 right-1 text-[9px] text-slate-300 pointer-events-none select-none">Admin: F2</div>

    <script>
        // ==========================================
        // ★ [교사용 설정] 조별 PDF 주소를 각각 입력해 주세요! ★
        // ==========================================
        const PDF_URLS_BY_TEAM = {
            "1": "https://docs.google.com/uc?export=download&id=1DoueYsPUZNkdeXh-R5YyHJ9RNRtblWkQ",
            "2": "https://docs.google.com/uc?export=download&id=11pl2-qscgpSIn2l5n6aj3NeZQr6CxnRG",
            "3": "https://docs.google.com/uc?export=download&id=1-3t_wb8HP5bPgqk_oyQQYTx96xhjl6zK",
            "4": "https://docs.google.com/uc?export=download&id=12aGfv8v5jZzkwrjI806mkRVnuxWUVJqV"
        };
        const GOOGLE_GAS_URL = "https://script.google.com/macros/s/AKfycbygSTP7Jk3n3T-Pa3-njcFV-rpGE_dsPsWL8ApfPzBEpnwQHsK31HC6TUcecKFGlw/exec";
        const TEACHER_PASSWORD = "4505"; 

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let pdfDoc = null, pdfScale = 1.3, currentMode = 'student', currentTool = 'text'; 
        let globalSubmissions = []; 
        let currentViewingStudentIndex = null; 
        
        let teamDataStore = {
            "1": { elements: [], pdfBuffer: null, initialized: false },
            "2": { elements: [], pdfBuffer: null, initialized: false },
            "3": { elements: [], pdfBuffer: null, initialized: false },
            "4": { elements: [], pdfBuffer: null, initialized: false }
        };

        // 초기 시작 시 1조 학습지를 기본으로 로드 시도
        window.addEventListener('DOMContentLoaded', () => {
            handleTeamChange();
        });

        window.addEventListener('keydown', function(e) { if (e.key === 'F2') { e.preventDefault(); triggerAdminAuth(); } });

        function triggerAdminAuth() {
            const inputPw = prompt("교사용 문항 배치를 위한 비밀번호를 입력하세요.");
            if (inputPw === TEACHER_PASSWORD) { alert("인증 성공! 교사용 편집 모드로 전환합니다."); switchMode('teacher'); } 
            else if (inputPw !== null) { alert("비밀번호가 올바르지 않습니다."); }
        }

        function exitTeacherMode() { clearStudentViewMode(); alert("학생 모드로 복귀합니다."); switchMode('student'); }
        function getCurrentTeam() { return document.getElementById('select-team').value; }

        // 조가 선택/변경되었을 때 실행되는 함수 (각 조의 전용 PDF 주소를 동적으로 다운로드)
        function handleTeamChange() {
            clearStudentViewMode();
            const team = getCurrentTeam(); 
            const container = document.getElementById('pdf-container'); 
            const store = teamDataStore[team];
            const targetUrl = PDF_URLS_BY_TEAM[team];

            if (store.pdfBuffer) { 
                loadPDF(store.pdfBuffer); 
            } else if (targetUrl && !targetUrl.includes("★")) {
                container.innerHTML = `<div class="bg-white p-6 rounded-xl border text-center text-slate-400 mt-6 text-xs">제 ${team}조 학습지 PDF를 원격 로드 중입니다...</div>`;
                fetch(targetUrl)
                    .then(res => { if(!res.ok) throw new Error(); return res.arrayBuffer(); })
                    .then(buffer => {
                        store.pdfBuffer = buffer;
                        loadPDF(buffer);
                    })
                    .catch(() => {
                        container.innerHTML = `<div class="bg-white p-6 rounded-xl border text-center text-red-400 mt-6 text-xs">${team}조 PDF 주소가 올바르지 않거나 공유 권한 권한이 없습니다.</div>`;
                    });
            } else {
                container.innerHTML = `<div class="bg-white p-6 rounded-xl border text-center text-slate-400 mt-6 text-xs">교사 코드 설정에서 [제 ${team}조] 전용 PDF 직접링크를 채워주세요.</div>`;
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            const badge = document.getElementById('badge-mode'); const exitBtn = document.getElementById('btn-exit-teacher');
            if(mode === 'teacher') {
                badge.className = "px-2.5 py-0.5 rounded-full text-[11px] font-bold bg-indigo-600 text-white";
                badge.innerHTML = `<i class="fa-solid fa-chalkboard-user mr-1"></i>교사 편집 모드`;
                exitBtn.classList.remove('hidden'); document.getElementById('panel-teacher').classList.remove('hidden'); document.getElementById('panel-student').classList.add('hidden');
            } else {
                badge.className = "px-2.5 py-0.5 rounded-full text-[11px] font-bold bg-emerald-500 text-white";
                badge.innerHTML = `<i class="fa-solid fa-user-graduate mr-1"></i>학생 모드`;
                exitBtn.classList.add('hidden'); document.getElementById('panel-teacher').classList.add('hidden'); document.getElementById('panel-student').classList.remove('hidden');
            }
            renderElements();
        }

        function setTool(tool) {
            currentTool = tool;
            ['text', 'textarea', 'multimedia'].forEach(t => {
                const btn = document.getElementById(`tool-${t}`);
                if(btn) btn.className = t === tool ? 'py-2 px-1 border rounded text-center text-[11px] font-medium bg-indigo-50 border-indigo-500 ring-2 ring-indigo-200' : 'py-2 px-1 border rounded text-center text-[11px] font-medium bg-slate-50';
            });
        }

        async function loadPDF(arrayBuffer) {
            const container = document.getElementById('pdf-container'); container.innerHTML = '';
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum); const viewport = page.getViewport({ scale: pdfScale });
                const pageDiv = document.createElement('div'); pageDiv.id = `page-container-${pageNum}`; pageDiv.className = 'pdf-page-container';
                pageDiv.style.width = `${viewport.width}px`; pageDiv.style.height = `${viewport.height}px`;

                const canvas = document.createElement('canvas'); canvas.className = 'absolute top-0 left-0 z-0';
                canvas.width = viewport.width; canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                pageDiv.appendChild(canvas);

                const interactiveLayer = document.createElement('div'); interactiveLayer.className = 'absolute inset-0 z-10';
                interactiveLayer.addEventListener('mousedown', function(e) {
                    if (currentMode !== 'teacher' || currentViewingStudentIndex !== null || e.target !== interactiveLayer) return;
                    const rect = interactiveLayer.getBoundingClientRect();
                    let w = 140, h = 26;
                    if (currentTool === 'textarea') { w = 200; h = 36; } 
                    else if (currentTool === 'multimedia') { w = 280; h = 200; }

                    const team = getCurrentTeam();
                    teamDataStore[team].elements.push({
                        id: 'el-' + Date.now(), page: pageNum, type: currentTool,
                        left: ((e.clientX - rect.left) / rect.width) * 100, top: ((e.clientY - rect.top) / rect.height) * 100,
                        width: (w / rect.width) * 100, height: (h / rect.height) * 100, value: "", canvasHistory: []
                    });
                    renderElements();
                });
                pageDiv.appendChild(interactiveLayer); container.appendChild(pageDiv);
            }
            renderElements();
        }

        async function fetchStudentSubmissions() {
            if (GOOGLE_GAS_URL.includes("★")) { alert("구글 URL 설정을 완료해야 불러오기가 가능합니다."); return; }
            const selectEl = document.getElementById('select-student-submission');
            selectEl.innerHTML = '<option value="">불러오는 중...</option>';
            
            try {
                const response = await fetch(GOOGLE_GAS_URL + "?action=readSubmissions&t=" + Date.now());
                const data = await response.json();
                globalSubmissions = data;
                
                selectEl.innerHTML = '<option value="">-- 제출 학생 선택 --</option>';
                const currentTeam = getCurrentTeam();
                
                let matchCount = 0;
                data.forEach((sub, idx) => {
                    if (String(sub.team) === String(currentTeam)) {
                        const opt = document.createElement('option');
                        opt.value = idx;
                        opt.innerText = `[${sub.studentId}] ${sub.studentName} (${sub.timestamp.split(' ')[1] || '제출'})`;
                        selectEl.appendChild(opt);
                        matchCount++;
                    }
                });
                if(matchCount === 0) alert(`${currentTeam}조에 해당하는 학생 제출 내역이 아직 구글 시트에 없습니다.`);
                else alert(`총 ${matchCount}명의 학생 제출 정보를 불러왔습니다! 아래 메뉴에서 학생을 골라주세요.`);
            } catch (err) {
                selectEl.innerHTML = '<option value="">로드 실패</option>';
                alert("구글 시트 연동 실패: 구글 앱스 스크립트 배포 설정을 확인해 주세요.");
            }
        }

        function loadStudentResponseToCanvas() {
            const val = document.getElementById('select-student-submission').value;
            if (val === "") { clearStudentViewMode(); return; }
            
            currentViewingStudentIndex = parseInt(val);
            document.getElementById('btn-clear-view').classList.remove('hidden');
            
            const studentData = globalSubmissions[currentViewingStudentIndex];
            const currentTeam = getCurrentTeam();
            
            let responsesArray = [];
            try {
                responsesArray = typeof studentData.responses === 'string' ? JSON.parse(studentData.responses) : studentData.responses;
            } catch(e) { responsesArray = []; }

            teamDataStore[currentTeam].elements.forEach(el => {
                const match = responsesArray.find(r => r.id === el.id);
                if (match) { el.value = match.value; } else { el.value = ""; }
            });
            
            renderElements();
        }

        function clearStudentViewMode() {
            currentViewingStudentIndex = null;
            document.getElementById('btn-clear-view').classList.add('hidden');
            const selectWidget = document.getElementById('select-student-submission');
            if (selectWidget) selectWidget.value = "";
            const currentTeam = getCurrentTeam();
            teamDataStore[currentTeam].elements.forEach(el => { el.value = ""; el.canvasHistory = []; });
            renderElements();
        }

        function renderElements() {
            document.querySelectorAll('.overlay-element, .student-element').forEach(el => el.remove());
            const team = getCurrentTeam();
            const isViewingMode = (currentViewingStudentIndex !== null);

            teamDataStore[team].elements.forEach(el => {
                const layer = document.getElementById(`page-container-${el.page}`)?.querySelector('div:not(canvas)'); if (!layer) return;
                const wrap = document.createElement('div'); wrap.style.left = `${el.left}%`; wrap.style.top = `${el.top}%`; wrap.style.width = `${el.width}%`; wrap.style.height = `${el.height}%`;

                if (currentMode === 'teacher' && !isViewingMode) {
                    wrap.className = 'overlay-element';
                    wrap.innerHTML = `<div class="absolute inset-0 flex items-center justify-center pointer-events-none text-[9px] font-bold text-indigo-500/40">[${el.type === 'multimedia' ? '그림판' : el.type}]</div>
                                      <button onclick="deleteElement('${el.id}')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px]">×</button>
                                      <div class="resize-handle"></div>`;
                    setupDragAndResize(wrap, el);
                } else {
                    wrap.className = 'student-element';
                    if (el.type === 'text') {
                        if (isViewingMode) {
                            const div = document.createElement('div'); div.className = 'viewer-text'; div.innerText = el.value || '(미입력)'; wrap.appendChild(div);
                        } else {
                            const input = document.createElement('input'); input.type = 'text'; input.className = 'student-text'; input.placeholder = '단답형 답변 작성';
                            input.value = el.value || ''; input.addEventListener('input', (e) => el.value = e.target.value); wrap.appendChild(input);
                        }
                    } else if (el.type === 'textarea') {
                        if (isViewingMode) {
                            const div = document.createElement('div'); div.className = 'viewer-textarea'; div.innerText = el.value || '(미입력)'; wrap.appendChild(div);
                        } else {
                            const ta = document.createElement('textarea'); ta.className = 'student-textarea'; ta.placeholder = '서술형 답변 내용을 입력하세요...';
                            ta.value = el.value || ''; ta.addEventListener('input', (e) => el.value = e.target.value); wrap.appendChild(ta);
                        }
                    } else if (el.type === 'multimedia') {
                        if (isViewingMode) {
                            const box = document.createElement('div'); box.className = "w-full h-full bg-white border-2 border-indigo-500 rounded relative overflow-hidden flex flex-col";
                            box.innerHTML = `<div class="bg-indigo-500 text-white font-bold text-[9px] px-1 py-0.5"><i class="fa-solid fa-palette"></i> 학생 그림판 제출 내용</div>`;
                            const imgArea = document.createElement('div'); imgArea.className = "flex-grow relative bg-slate-50";
                            if(el.value && el.value.indexOf("data:image") === 0) {
                                const sImg = document.createElement('img'); sImg.src = el.value; sImg.className = "w-full h-full object-contain absolute inset-0"; imgArea.appendChild(sImg);
                            } else {
                                imgArea.innerHTML = `<div class="text-center text-slate-400 text-[10px] mt-8">그림 데이터 없음</div>`;
                            }
                            box.appendChild(imgArea); wrap.appendChild(box);
                        } else {
                            const cvContainer = document.createElement('div'); cvContainer.className = "student-canvas-container shadow-inner";
                            cvContainer.innerHTML = `
                                <div class="canvas-toolbar flex flex-col p-1 bg-slate-50 border-b border-slate-200">
                                    <div class="flex items-center justify-between w-full mb-1">
                                        <div class="flex space-x-1 items-center bg-white p-1 rounded border">
                                            <button class="color-pick-btn bg-black active" data-color="#000000"></button>
                                            <button class="color-pick-btn bg-red-500" data-color="#ef4444"></button>
                                            <button class="color-pick-btn bg-blue-500" data-color="#3b82f6"></button>
                                            <button class="color-pick-btn bg-emerald-500" data-color="#10b981"></button>
                                            <button class="color-pick-btn bg-amber-400" data-color="#f59e0b"></button>
                                            <button class="color-pick-btn bg-purple-500" data-color="#a855f7"></button>
                                        </div>
                                        <div class="flex space-x-1">
                                            <button class="px-1.5 py-0.5 bg-slate-200 hover:bg-slate-300 rounded text-[10px] font-bold text-slate-700" data-tool="pen">펜</button>
                                            <button class="px-1.5 py-0.5 bg-slate-200 hover:bg-slate-300 rounded text-[10px] font-bold text-slate-700" data-tool="eraser">지우개</button>
                                            <button class="px-1.5 py-0.5 bg-slate-200 hover:bg-red-100 rounded text-[10px] font-bold text-red-600" data-tool="undo">되돌리기</button>
                                        </div>
                                    </div>
                                    <div class="flex items-center space-x-2 w-full bg-white px-1.5 py-0.5 rounded border text-[9px] font-medium text-slate-500">
                                        <span id="brush-label-txt">펜 굵기: 3px</span>
                                        <input type="range" min="1" max="25" value="3" class="flex-grow accent-indigo-600 h-1" data-slider="size">
                                    </div>
                                </div>
                            `;
                            const cv = document.createElement('canvas'); cv.className = 'student-canvas'; cvContainer.appendChild(cv); wrap.appendChild(cvContainer);

                            setTimeout(() => {
                                cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
                                const ctx = cv.getContext('2d'); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                                
                                let drawColor = "#000000"; let currentBrushMode = "pen"; 
                                let penSize = 3; let eraserSize = 10;

                                if (el.value && el.value.indexOf("data:image") === 0) {
                                    const img = new Image(); img.onload = () => { ctx.drawImage(img, 0, 0); if(!el.canvasHistory.length) saveCanvasState(cv, el); }; img.src = el.value;
                                } else if(el.canvasHistory && el.canvasHistory.length > 0) {
                                    const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = el.canvasHistory[el.canvasHistory.length - 1];
                                } else { saveCanvasState(cv, el); }

                                const colorBtns = cvContainer.querySelectorAll('.color-pick-btn');
                                colorBtns.forEach(b => {
                                    b.onclick = () => {
                                        colorBtns.forEach(c => c.classList.remove('active')); b.classList.add('active');
                                        drawColor = b.getAttribute('data-color'); currentBrushMode = "pen";
                                        cvContainer.querySelector('#brush-label-txt').innerText = `펜 굵기: ${penSize}px`;
                                        cvContainer.querySelector('[data-slider="size"]').value = penSize;
                                    };
                                });

                                cvContainer.querySelector('[data-tool="pen"]').onclick = () => {
                                    currentBrushMode = "pen";
                                    cvContainer.querySelector('#brush-label-txt').innerText = `펜 굵기: ${penSize}px`;
                                    cvContainer.querySelector('[data-slider="size"]').value = penSize;
                                };
                                cvContainer.querySelector('[data-tool="eraser"]').onclick = () => {
                                    currentBrushMode = "eraser";
                                    cvContainer.querySelector('#brush-label-txt').innerText = `지우개 굵기: ${eraserSize}px`;
                                    cvContainer.querySelector('[data-slider="size"]').value = eraserSize;
                                };

                                const sizeSlider = cvContainer.querySelector('[data-slider="size"]');
                                sizeSlider.oninput = (e) => {
                                    const val = parseInt(e.target.value);
                                    if (currentBrushMode === "pen") { penSize = val; cvContainer.querySelector('#brush-label-txt').innerText = `펜 굵기: ${penSize}px`; } 
                                    else { eraserSize = val; cvContainer.querySelector('#brush-label-txt').innerText = `지우개 굵기: ${eraserSize}px`; }
                                };

                                cvContainer.querySelector('[data-tool="undo"]').onclick = () => {
                                    if (el.canvasHistory && el.canvasHistory.length > 1) {
                                        el.canvasHistory.pop(); const prevState = el.canvasHistory[el.canvasHistory.length - 1];
                                        const img = new Image(); img.onload = () => { ctx.clearRect(0, 0, cv.width, cv.height); ctx.drawImage(img, 0, 0); el.value = cv.toDataURL(); }; img.src = prevState;
                                    } else if(el.canvasHistory && el.canvasHistory.length === 1) {
                                        ctx.clearRect(0, 0, cv.width, cv.height); el.canvasHistory = []; el.value = ""; saveCanvasState(cv, el);
                                    }
                                };
                                setupDrawing(cv, ctx, el, () => currentBrushMode === "eraser" ? "#ffffff" : drawColor, () => currentBrushMode === "eraser" ? eraserSize : penSize);
                            }, 50);
                        }
                    }
                }
                layer.appendChild(wrap);
            });
        }

        function saveCanvasState(canvas, elObj) { if(!elObj.canvasHistory) elObj.canvasHistory = []; elObj.canvasHistory.push(canvas.toDataURL()); elObj.value = canvas.toDataURL(); }
        
        function setupDrawing(cv, ctx, elObj, getColor, getWidth) {
            let active = false;
            function start(e) { active = true; ctx.beginPath(); draw(e); }
            function end() { if(active) { active = false; ctx.beginPath(); saveCanvasState(cv, elObj); } }
            function draw(e) {
                if (!active) return; e.preventDefault(); const r = cv.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.lineWidth = getWidth(); ctx.strokeStyle = getColor(); ctx.lineTo(cx - r.left, cy - r.top); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx - r.left, cy - r.top);
            }
            cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', draw); cv.addEventListener('mouseup', end); cv.addEventListener('mouseleave', end);
            cv.addEventListener('touchstart', start, { passive: false }); cv.addEventListener('touchmove', draw, { passive: false }); cv.addEventListener('touchend', end);
        }

        function setupDragAndResize(wrap, elObj) {
            let isDrag = false, isResize = false, sx, sy, sl, st, sw, sh;
            function handleStart(clientX, clientY, target) {
                const pRect = wrap.parentElement.getBoundingClientRect();
                if (target.classList.contains('resize-handle')) { isResize = true; sx = clientX; sy = clientY; sw = parseFloat(wrap.style.width); sh = parseFloat(wrap.style.height); }
                else { isDrag = true; sx = clientX; sy = clientY; sl = parseFloat(wrap.style.left); st = parseFloat(wrap.style.top); }
                function move(moveClientX, moveClientY) {
                    if (isResize) { elObj.width = Math.max(8, sw + ((moveClientX - sx) / pRect.width) * 100); elObj.height = Math.max(4, sh + ((moveClientY - sy) / pRect.height) * 100); wrap.style.width = elObj.width + '%'; wrap.style.height = elObj.height + '%'; }
                    else if (isDrag) { elObj.left = Math.max(0, Math.min(100 - elObj.width, sl + ((moveClientX - sx) / pRect.width) * 100)); elObj.top = Math.max(0, Math.min(100 - elObj.height, st + ((moveClientY - sy) / pRect.height) * 100)); wrap.style.left = elObj.left + '%'; wrap.style.top = elObj.top + '%'; }
                }
                function mouseMoveHandler(me) { move(me.clientX, me.clientY); }
                function mouseUpHandler() { isDrag = isResize = false; document.removeEventListener('mousemove', mouseMoveHandler); document.removeEventListener('mouseup', mouseUpHandler); }
                function touchMoveHandler(te) { if(te.touches.length === 1) { move(te.touches[0].clientX, te.touches[0].clientY); } }
                function touchEndHandler() { isDrag = isResize = false; document.removeEventListener('touchmove', touchMoveHandler); document.removeEventListener('touchend', touchEndHandler); }
                document.addEventListener('mousemove', mouseMoveHandler); document.addEventListener('mouseup', mouseUpHandler);
                document.addEventListener('touchmove', touchMoveHandler, { passive: false }); document.addEventListener('touchend', touchEndHandler);
            }
            wrap.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); handleStart(e.clientX, e.clientY, e.target); } });
            wrap.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.touches.length === 1) { handleStart(e.touches[0].clientX, e.touches[0].clientY, e.target); } });
        }

        function deleteElement(id) { const team = getCurrentTeam(); teamDataStore[team].elements = teamDataStore[team].elements.filter(el => el.id !== id); renderElements(); }
        function exportBlueprint() { navigator.clipboard.writeText(JSON.stringify(teamDataStore, null, 2)); alert("배치 데이터 복사 완료!"); }
        function importBlueprint() { try { const res = JSON.parse(prompt("JSON 데이터를 붙여넣으세요.")); if(res["1"]) { teamDataStore = res; handleTeamChange(); alert("데이터 동기화 완료!"); } } catch { alert("잘못된 데이터입니다."); } }

        async function submitWorksheet() {
            const team = getCurrentTeam(); const sid = document.getElementById('student-id').value.trim(); const sname = document.getElementById('student-name').value.trim();
            if (!sid || !sname) { alert("학번과 이름을 입력하셔야 제출이 가능합니다."); return; }
            const elements = teamDataStore[team].elements;
            if (elements.length === 0) { alert("제출할 문항이 배치되지 않은 학습지입니다."); return; }
            for (let i = 0; i < elements.length; i++) {
                const el = elements[i];
                if (!el.value || el.value.trim() === "") { alert(`⚠️ 아직 풀지 않은 문제가 있습니다!\n모든 칸을 채우고 그림을 그려야 제출할 수 있습니다.`); return; }
            }
            if (GOOGLE_GAS_URL.includes("★")) { alert("구글 URL 설정을 마쳐야 제출 가능합니다."); return; }
            const btn = document.getElementById('btn-submit'); btn.disabled = true; btn.innerText = "제출 중...";
            try {
                await fetch(GOOGLE_GAS_URL, {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ team: team, studentId: sid, studentName: sname, responses: elements.map(el => ({ id: el.id, type: el.type, value: el.value || "" })), timestamp: new Date().toLocaleString() })
                });
                alert("🎉 [" + team + "조] 모든 문항이 정상 입력되어 구글 시트로 안전하게 제출되었습니다!");
            } catch (err) { alert("오류 발생: " + err.message); } finally { btn.disabled = false; btn.innerText = "구글 시트로 답안 제출하기"; }
        }
    </script>
</body>
