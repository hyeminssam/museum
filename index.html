<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조별 인터랙티브 PDF 학습지 플레이어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .pdf-page-container { position: relative; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); background: white; border-radius: 0.5rem; overflow: hidden; }
        .overlay-element { position: absolute; border: 2px dashed #4f46e5; background: rgba(79, 70, 229, 0.05); cursor: move; box-sizing: border-box; }
        .student-element { position: absolute; box-sizing: border-box; }
        .student-text { border: 1px solid #cbd5e1; background: rgba(255,255,255,0.9); border-radius: 0.25rem; padding: 4px; font-size: 14px; width:100%; height:100%; outline:none; }
        .student-text:focus { border-color:#4f46e5; }
        .student-textarea { border: 1px solid #cbd5e1; background: rgba(255,255,255,0.9); border-radius: 0.25rem; padding: 6px; font-size: 14px; width:100%; height:100%; resize:none; outline:none; }
        .student-textarea:focus { border-color:#4f46e5; }
        .student-image-box { border: 2px dashed #64748b; background: rgba(241,245,249,0.9); border-radius: 0.375rem; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; width:100%; height:100%; overflow:hidden; position:relative; }
        .student-image-box img { width:100%; height:100%; object-fit:contain; position:absolute; top:0; left:0; }
        .student-canvas { border: 1px solid #94a3b8; background: rgba(255,255,255,0.8); border-radius:0.375rem; cursor:crosshair; width:100%; height:100%; }
        .resize-handle { position: absolute; width: 10px; height: 10px; background: #4f46e5; right: -5px; bottom: -5px; cursor: se-resize; border-radius: 50%; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-indigo-900 text-white px-6 py-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-users-viewfinder text-2xl text-emerald-400"></i>
            <h1 class="text-xl font-bold">디지털 조별 맞춤형 학습지 시스템</h1>
        </div>
        <div class="bg-indigo-800 p-1 rounded-lg flex space-x-1">
            <button id="btn-mode-teacher" class="px-4 py-1.5 rounded-md text-sm font-medium bg-indigo-600 text-white" onclick="switchMode('teacher')">선생님 모드 (문항 배치)</button>
            <button id="btn-mode-student" class="px-4 py-1.5 rounded-md text-sm font-medium text-indigo-200 hover:text-white" onclick="switchMode('student')">학생 모드 (작성/제출)</button>
        </div>
    </header>

    <div class="flex-grow flex flex-col lg:flex-row">
        <aside class="w-full lg:w-80 bg-white border-r border-slate-200 p-6 flex flex-col space-y-6 shrink-0">
            
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <label class="block text-xs font-bold text-slate-700 mb-2"><i class="fa-solid fa-people-group mr-1 text-indigo-600"></i> 소속 조 선택 (현재 편집/작성 중인 조)</label>
                <select id="select-team" onchange="handleTeamChange()" class="w-full px-3 py-2 border rounded-lg text-sm bg-white font-semibold text-slate-800 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="1">제 1 조 학습지</option>
                    <option value="2">제 2 조 학습지</option>
                    <option value="3">제 3 조 학습지</option>
                    <option value="4">제 4 조 학습지</option>
                </select>
                <p class="text-[11px] text-slate-400 mt-1.5">※ 조를 바꾸면 해당 조의 PDF와 문항 배치로 화면이 실시간 전환됩니다.</p>
            </div>

            <div id="panel-teacher" class="space-y-6">
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase mb-2">1단계: 현재 조의 PDF 파일 로드</h2>
                    <input type="file" id="pdf-file-input" accept="application/pdf" onchange="handlePDFUpload(event)" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 w-full">
                </div>
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase mb-2">2단계: 배치할 문항 종류 선택</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setTool('text')" id="tool-text" class="p-3 border rounded-lg text-center text-xs font-medium bg-indigo-50 border-indigo-500 ring-2 ring-indigo-200">단답형 입력</button>
                        <button onclick="setTool('textarea')" id="tool-textarea" class="p-3 border rounded-lg text-center text-xs font-medium bg-slate-50">서술형 박스</button>
                        <button onclick="setTool('image')" id="tool-image" class="p-3 border rounded-lg text-center text-xs font-medium bg-slate-50">사진 촬영/첨부</button>
                        <button onclick="setTool('canvas')" id="tool-canvas" class="p-3 border rounded-lg text-center text-xs font-medium bg-slate-50">그림판 스케치</button>
                    </div>
                </div>
                <div class="border-t pt-4">
                    <button onclick="exportBlueprint()" class="w-full bg-slate-800 text-white py-2 rounded text-xs font-medium hover:bg-slate-900"><i class="fa-solid fa-copy mr-1"></i>현재 조의 구조(JSON) 복사</button>
                    <button onclick="importBlueprint()" class="w-full bg-slate-100 text-slate-700 py-2 rounded text-xs font-medium hover:bg-slate-200 mt-2">복사해둔 조별 구조 불러오기</button>
                </div>
            </div>

            <div id="panel-student" class="hidden space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">학번 (예: 10101)</label>
                    <input type="text" id="student-id" class="w-full px-3 py-2 border rounded text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">이름</label>
                    <input type="text" id="student-name" class="w-full px-3 py-2 border rounded text-sm outline-none">
                </div>
                <div class="pt-4 border-t">
                    <button id="btn-submit" onclick="submitWorksheet()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-lg shadow-md flex items-center justify-center text-sm">
                        <i class="fa-solid fa-paper-plane mr-2"></i>조별 답안 구글 시트로 제출
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-grow p-8 overflow-y-auto max-h-[calc(100vh-73px)] flex flex-col items-center">
            <div id="pdf-container" class="w-full max-w-4xl flex flex-col items-center">
                <div class="bg-white p-8 rounded-xl border text-center text-slate-400 mt-12 text-sm">소속 조를 선택한 후, 왼쪽 메뉴에서 조에 맞는 PDF 파일을 연동해 주세요.</div>
            </div>
        </main>
    </div>

    <script>
        // ★★★ [설정 연결 1] 구글에서 복사해온 웹 앱 URL 주소를 넣어주세요 ★★★
        const GOOGLE_GAS_URL = "https://script.google.com/macros/s/AKfycbxIPPlHWJqFHjG6d8gFe9xhB6sfFRTPJi3rO5Eguci77qDnDBfQgro7agFe2LazebOr/exec";

        // ★★★ [설정 연결 2] 미리 업로드된 각 조별 고정 PDF 파일 주소가 있다면 아래에 지정 가능합니다 (없으면 빈칸 유지 후 수동업로드 가능) ★★★
        const TEAM_PDF_URLS = {
            "1": "", // 예: "https://yourdomain.com/pdf/team1.pdf"
            "2": "",
            "3": "",
            "4": ""
        };

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let pdfDoc = null, pdfScale = 1.3, currentMode = 'teacher', currentTool = 'text';
        
        // 조별로 매핑 상태 데이터를 분리하여 관리하기 위한 바인딩 오브젝트
        let teamDataStore = {
            "1": { elements: [], pdfBuffer: null },
            "2": { elements: [], pdfBuffer: null },
            "3": { elements: [], pdfBuffer: null },
            "4": { elements: [], pdfBuffer: null }
        };

        function getCurrentTeam() {
            return document.getElementById('select-team').value;
        }

        function handleTeamChange() {
            const team = getCurrentTeam();
            const container = document.getElementById('pdf-container');
            container.innerHTML = '';

            const store = teamDataStore[team];
            if (store.pdfBuffer) {
                loadPDF(store.pdfBuffer, false); // 기존 보관된 파일 버퍼가 있으면 재로드
            } else if (TEAM_PDF_URLS[team]) {
                // 고정 URL 주소가 사전에 하드코딩되어 세팅되어 있는 경우 서버 원격 호출 다운로드 진행
                fetch(TEAM_PDF_URLS[team])
                    .then(res => res.arrayBuffer())
                    .then(buffer => {
                        store.pdfBuffer = buffer;
                        loadPDF(buffer, false);
                    });
            } else {
                container.innerHTML = `<div class="bg-white p-8 rounded-xl border text-center text-slate-400 mt-12 text-sm">제 [${team}] 조에 매핑된 학습지 데이터가 없습니다. 왼쪽 메뉴에서 현재 조의 PDF를 먼저 선택해 주세요.</div>`;
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-mode-teacher').className = mode === 'teacher' ? 'px-4 py-1.5 rounded-md text-sm font-medium bg-indigo-600 text-white' : 'px-4 py-1.5 rounded-md text-sm font-medium text-indigo-200 hover:text-white';
            document.getElementById('btn-mode-student').className = mode === 'student' ? 'px-4 py-1.5 rounded-md text-sm font-medium bg-indigo-600 text-white' : 'px-4 py-1.5 rounded-md text-sm font-medium text-indigo-200 hover:text-white';
            document.getElementById('panel-teacher').classList.toggle('hidden', mode !== 'teacher');
            document.getElementById('panel-student').classList.toggle('hidden', mode !== 'student');
            renderElements();
        }

        function setTool(tool) {
            currentTool = tool;
            ['text', 'textarea', 'image', 'canvas'].forEach(t => {
                document.getElementById(`tool-${t}`).className = t === tool ? 'p-3 border rounded-lg text-center text-xs font-medium bg-indigo-50 border-indigo-500 ring-2 ring-indigo-200' : 'p-3 border rounded-lg text-center text-xs font-medium bg-slate-50';
            });
        }

        function handlePDFUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) { loadPDF(e.target.result, true); };
            reader.readAsArrayBuffer(file);
        }

        async function loadPDF(arrayBuffer, saveToStore) {
            const team = getCurrentTeam();
            if (saveToStore) {
                teamDataStore[team].pdfBuffer = arrayBuffer;
            }

            const container = document.getElementById('pdf-container');
            container.innerHTML = '';
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: pdfScale });

                const pageDiv = document.createElement('div');
                pageDiv.id = `page-container-${pageNum}`;
                pageDiv.className = 'pdf-page-container';
                pageDiv.style.width = `${viewport.width}px`;
                pageDiv.style.height = `${viewport.height}px`;

                const canvas = document.createElement('canvas');
                canvas.className = 'absolute top-0 left-0 z-0';
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                pageDiv.appendChild(canvas);

                const interactiveLayer = document.createElement('div');
                interactiveLayer.className = 'absolute inset-0 z-10';
                interactiveLayer.addEventListener('mousedown', function(e) {
                    if (currentMode !== 'teacher' || e.target !== interactiveLayer) return;
                    const rect = interactiveLayer.getBoundingClientRect();
                    let w = 150, h = 32;
                    if (currentTool === 'textarea') { w = 240; h = 70; }
                    else if (currentTool === 'image') { w = 180; h = 120; }
                    else if (currentTool === 'canvas') { w = 250; h = 150; }

                    teamDataStore[team].elements.push({
                        id: 'el-' + Date.now(), page: pageNum, type: currentTool,
                        left: ((e.clientX - rect.left) / rect.width) * 100,
                        top: ((e.clientY - rect.top) / rect.height) * 100,
                        width: (w / rect.width) * 100, height: (h / rect.height) * 100, value: ""
                    });
                    renderElements();
                });

                pageDiv.appendChild(interactiveLayer);
                container.appendChild(pageDiv);
            }
            renderElements();
        }

        function renderElements() {
            document.querySelectorAll('.overlay-element, .student-element').forEach(el => el.remove());
            const team = getCurrentTeam();
            const currentElements = teamDataStore[team].elements;

            currentElements.forEach(el => {
                const layer = document.getElementById(`page-container-${el.page}`)?.querySelector('div:not(canvas)');
                if (!layer) return;

                const wrap = document.createElement('div');
                wrap.style.left = `${el.left}%`; wrap.style.top = `${el.top}%`; wrap.style.width = `${el.width}%`; wrap.style.height = `${el.height}%`;

                if (currentMode === 'teacher') {
                    wrap.className = 'overlay-element';
                    wrap.innerHTML = `<div class="absolute inset-0 flex items-center justify-center pointer-events-none text-[9px] font-bold text-slate-400 bg-indigo-500/5">[${el.type}]</div>
                                      <button onclick="deleteElement('${el.id}')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px]">×</button>
                                      <div class="resize-handle"></div>`;
                    setupDragAndResize(wrap, el);
                } else {
                    wrap.className = 'student-element';
                    if (el.type === 'text') {
                        const input = document.createElement('input'); input.type = 'text'; input.className = 'student-text'; input.placeholder = '답변 작성';
                        input.value = el.value || ''; input.addEventListener('input', (e) => el.value = e.target.value);
                        wrap.appendChild(input);
                    } else if (el.type === 'textarea') {
                        const ta = document.createElement('textarea'); ta.className = 'student-textarea'; ta.placeholder = '서술형 작성';
                        ta.value = el.value || ''; ta.addEventListener('input', (e) => el.value = e.target.value);
                        wrap.appendChild(ta);
                    } else if (el.type === 'image') {
                        const box = document.createElement('div'); box.className = 'student-image-box';
                        const fi = document.createElement('input'); fi.type = 'file'; fi.accept = 'image/*'; fi.capture = 'camera'; fi.className = 'hidden';
                        box.innerHTML = `<div class="text-center p-1"><i class="fa-solid fa-camera text-slate-400"></i><p class="text-[9px] text-slate-400">사진등록</p></div>`;
                        if (el.value) { const img = document.createElement('img'); img.src = el.value; box.appendChild(img); }
                        box.appendChild(fi); box.addEventListener('click', () => fi.click());
                        fi.addEventListener('change', (e) => {
                            const f = e.target.files[0]; if (!f) return;
                            const r = new FileReader(); r.onload = (evt) => { el.value = evt.target.result; renderElements(); }; r.readAsDataURL(f);
                        });
                        wrap.appendChild(box);
                    } else if (el.type === 'canvas') {
                        const cv = document.createElement('canvas'); cv.className = 'student-canvas'; wrap.appendChild(cv);
                        setTimeout(() => {
                            cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
                            const ctx = cv.getContext('2d'); ctx.strokeStyle = '#4f46e5'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
                            if (el.value) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = el.value; }
                            setupDrawing(cv, ctx, el);
                        }, 40);
                    }
                }
                layer.appendChild(wrap);
            });
        }

        function setupDragAndResize(wrap, elObj) {
            let isDrag = false, isResize = false, sx, sy, sl, st, sw, sh;
            wrap.addEventListener('mousedown', function(e) {
                const pRect = wrap.parentElement.getBoundingClientRect();
                if (e.target.classList.contains('resize-handle')) {
                    isResize = true; e.preventDefault(); sx = e.clientX; sy = e.clientY; sw = parseFloat(wrap.style.width); sh = parseFloat(wrap.style.height);
                } else {
                    isDrag = true; sx = e.clientX; sy = e.clientY; sl = parseFloat(wrap.style.left); st = parseFloat(wrap.style.top);
                }
                function move(me) {
                    if (isResize) { elObj.width = Math.max(5, sw + ((me.clientX - sx) / pRect.width) * 100); elObj.height = Math.max(5, sh + ((me.clientY - sy) / pRect.height) * 100); wrap.style.width = elObj.width + '%'; wrap.style.height = elObj.height + '%'; }
                    else if (isDrag) { elObj.left = Math.max(0, Math.min(100 - elObj.width, sl + ((me.clientX - sx) / pRect.width) * 100)); elObj.top = Math.max(0, Math.min(100 - elObj.height, st + ((me.clientY - sy) / pRect.height) * 100)); wrap.style.left = elObj.left + '%'; wrap.style.top = elObj.top + '%'; }
                }
                function up() { isDrag = isResize = false; document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); }
                document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
            });
        }

        function setupDrawing(cv, ctx, elObj) {
            let active = false;
            function start(e) { active = true; draw(e); }
            function end() { active = false; ctx.beginPath(); elObj.value = cv.toDataURL(); }
            function draw(e) {
                if (!active) return; e.preventDefault();
                const r = cv.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.lineTo(cx - r.left, cy - r.top); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx - r.left, cy - r.top);
            }
            cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', draw); cv.addEventListener('mouseup', end);
            cv.addEventListener('touchstart', start, { passive: false }); cv.addEventListener('touchmove', draw, { passive: false }); cv.addEventListener('touchend', end);
        }

        function deleteElement(id) { 
            const team = getCurrentTeam();
            teamDataStore[team].elements = teamDataStore[team].elements.filter(el => el.id !== id); 
            renderElements(); 
        }
        
        function exportBlueprint() { 
            navigator.clipboard.writeText(JSON.stringify(teamDataStore, null, 2)); 
            alert("전체 조별 문항 배치 데이터 통합본이 복사되었습니다! 이를 잘 보관해 두세요."); 
        }
        
        function importBlueprint() { 
            try { 
                const res = JSON.parse(prompt("보관 중인 전체 조별 세팅 JSON 데이터를 붙여넣으세요.")); 
                if(res["1"]) { 
                    teamDataStore = res; 
                    handleTeamChange();
                    alert("모든 조의 데이터 동기화 완료!"); 
                } 
            } catch { alert("잘못된 데이터입니다."); } 
        }

        async function submitWorksheet() {
            const team = getCurrentTeam();
            const sid = document.getElementById('student-id').value.trim();
            const sname = document.getElementById('student-name').value.trim();
            if (!sid || !sname) { alert("학번과 이름을 입력하세요."); return; }
            if (GOOGLE_GAS_URL.includes("★")) { alert("코드 내 구글 웹앱 URL 설정을 마쳐야 제출 가능합니다."); return; }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = "제출 중...";

            try {
                await fetch(GOOGLE_GAS_URL, {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        team: team, // ★ 학생이 속한 조 정보 전송 추가 ★
                        studentId: sid, 
                        studentName: sname, 
                        responses: teamDataStore[team].elements.map(el => ({ id: el.id, type: el.type, value: el.value || "" })), 
                        timestamp: new Date().toLocaleString() 
                    })
                });
                alert("[" + team + "조] 답안이 구글 시트로 무사히 제출되었습니다!");
            } catch (err) {
                alert("오류 발생: " + err.message);
            } finally {
                btn.disabled = false; btn.innerText = "조별 답안 구글 시트로 제출";
            }
        }
    </script>
</body>
</html>
