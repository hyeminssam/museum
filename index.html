<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0">
    <title>국립중앙박물관 학습지 & 교사용 통합 채점 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght=400;500;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; -webkit-text-size-adjust: none; }
        .pdf-page-container { position: relative; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); background: white; border-radius: 0.5rem; overflow: hidden; display: block; clear: both; }
        .overlay-element { position: absolute; border: 2px dashed #4f46e5; background: rgba(79, 70, 229, 0.05); cursor: move; box-sizing: border-box; }
        .student-element { position: absolute; box-sizing: border-box; }
        .student-text { border: 1px solid #cbd5e1; background: rgba(255,255,255,0.95); border-radius: 0.25rem; padding: 4px; font-size: 14px; width:100%; height:100%; outline:none; }
        .student-text:focus { border-color:#4f46e5; background: #fff; }
        .student-textarea { border: 1px solid #cbd5e1; background: rgba(255,255,255,0.95); border-radius: 0.25rem; padding: 4px 6px; font-size: 13px; line-height: 1.3; width:100%; height:100%; resize:none; outline:none; }
        .student-textarea:focus { border-color:#4f46e5; background: #fff; }
        .student-canvas-container { position: relative; width: 100%; height: 100%; background: rgba(255,255,255,0.95); border: 1px solid #94a3b8; border-radius: 0.375rem; overflow: hidden; display: flex; flex-direction: column; }
        .canvas-toolbar { display: flex; flex-direction: column; background: #f8fafc; padding: 6px; border-bottom: 1px solid #cbd5e1; z-index: 5; shrink-0; gap: 4px; }
        .student-canvas { cursor: crosshair; flex-grow: 1; width: 100%; height: 100%; background: transparent; touch-action: none; }
        .resize-handle { position: absolute; width: 14px; height: 14px; background: #4f46e5; right: -7px; bottom: -7px; cursor: se-resize; border-radius: 50%; z-index: 20; }
        .pdf-scroller { width: 100%; overflow: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; align-items: center; }
        .viewer-text { border: 1px solid #6366f1; background: #e0e7ff; color: #1e1b4b; font-weight: bold; border-radius: 0.25rem; padding: 4px; font-size: 14px; width:100%; height:100%; overflow: hidden; text-overflow: ellipsis; }
        .viewer-textarea { border: 1px solid #6366f1; background: #e0e7ff; color: #1e1b4b; font-weight: bold; border-radius: 0.25rem; padding: 4px 6px; font-size: 13px; line-height: 1.3; width:100%; height:100%; overflow-y:auto; resize:none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-indigo-900 text-white px-4 py-3 shadow-md flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-graduation-cap text-xl text-emerald-400"></i>
            <h1 class="text-sm md:text-base font-bold tracking-tight">스마트 디지털 교사용 통합 학습 시스템</h1>
        </div>
        <div class="flex items-center space-x-2">
            <span id="badge-mode" class="px-2.5 py-0.5 rounded-full text-[11px] font-bold bg-emerald-500 text-white"><i class="fa-solid fa-user-graduate mr-1"></i>학생 모드</span>
            <button id="btn-exit-teacher" class="hidden px-2 py-0.5 bg-red-600 hover:bg-red-700 text-white text-[11px] font-medium rounded" onclick="exitTeacherMode()">편집 종료</button>
        </div>
    </header>

    <div class="flex-grow flex flex-col lg:flex-row">
        <aside class="w-full lg:w-72 bg-white border-b lg:border-b-0 lg:border-r border-slate-200 p-4 flex flex-col space-y-4 shrink-0">
            <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 shadow-sm">
                <label class="block text-xs font-bold text-slate-700 mb-1.5"><i class="fa-solid fa-people-group mr-1 text-indigo-600"></i> 소속 조 선택</label>
                <select id="select-team" onchange="handleTeamChange()" class="w-full px-2.5 py-1.5 border rounded-lg text-xs bg-white font-semibold text-slate-800 outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="1">제 1 조 학습지</option>
                    <option value="2">제 2 조 학습지</option>
                    <option value="3">제 3 조 학습지</option>
                    <option value="4">제 4 조 학습지</option>
                </select>
            </div>

            <div id="panel-teacher" class="hidden space-y-4 bg-indigo-50/50 p-3 rounded-xl border border-indigo-100">
                <div class="text-center font-bold text-xs text-indigo-800 border-b pb-1.5 mb-1">🔒 교사 전용 관리자 메뉴</div>
                <div class="bg-amber-50 p-2 rounded-lg border border-amber-200 shadow-inner space-y-1.5">
                    <label class="block text-[11px] font-bold text-amber-900"><i class="fa-solid fa-cloud-arrow-up mr-1 text-red-500"></i> ☁️ 원격 PDF 업로드</label>
                    <input type="file" id="upload-pdf-file" accept="application/pdf" onchange="uploadPDFToServer(this)" class="w-full text-[10px] text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-[10px] file:font-semibold file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200">
                </div>
                <div class="border-t pt-2">
                    <h2 class="text-[11px] font-bold text-slate-500 uppercase mb-1">문항 배치 도구</h2>
                    <div class="grid grid-cols-3 gap-1 mb-2">
                        <button onclick="setTool('text')" id="tool-text" class="py-2 px-1 border rounded text-center text-[11px] font-medium bg-indigo-50 border-indigo-500 ring-2 ring-indigo-200">단답형</button>
                        <button onclick="setTool('textarea')" id="tool-textarea" class="py-2 px-1 border rounded text-center text-[11px] font-medium bg-slate-50">서술형</button>
                        <button onclick="setTool('multimedia')" id="tool-multimedia" class="py-2 px-1 border rounded text-center text-[11px] font-medium bg-slate-50">그림판</button>
                    </div>
                    <button id="btn-save-blueprint" onclick="saveBlueprintToServer()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-[11px] font-bold py-2 rounded shadow">
                        <i class="fa-solid fa-floppy-disk mr-1"></i> 현재 구조 서버 저장
                    </button>
                </div>
                <div class="bg-white p-2 rounded-lg border border-indigo-200 shadow-inner space-y-2 pt-2 border-t">
                    <label class="block text-[11px] font-bold text-indigo-900"><i class="fa-solid fa-clipboard-check mr-1 text-emerald-500"></i> 📢 학생 제출 답안 채점</label>
                    <button onclick="fetchStudentSubmissions()" class="w-full bg-slate-700 hover:bg-slate-800 text-white text-[10px] font-bold py-1.5 rounded shadow">제출 현황 불러오기</button>
                    <select id="select-student-submission" onchange="loadStudentResponseToCanvas()" class="w-full px-2 py-1 border rounded text-[11px] bg-slate-50 outline-none font-medium">
                        <option value="">-- 제출 학생 선택 --</option>
                    </select>
                    <button id="btn-clear-view" onclick="clearStudentViewMode()" class="hidden w-full bg-slate-500 hover:bg-slate-600 text-white text-[10px] py-1 rounded">채점 종료 (답안 보기 해제)</button>
                </div>
            </div>

            <div id="panel-student" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-700 mb-0.5">학번 (5자리)</label>
                        <input type="text" id="student-id" placeholder="예: 10203" class="w-full px-2 py-1.5 border rounded text-xs outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-700 mb-0.5">이름</label>
                        <input type="text" id="student-name" placeholder="홍길동" class="w-full px-2 py-1.5 border rounded text-xs outline-none">
                    </div>
                </div>
                <div class="pt-2 border-t">
                    <button id="btn-submit" onclick="submitWorksheet()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-lg shadow flex items-center justify-center text-xs">
                        <i class="fa-solid fa-paper-plane mr-1.5"></i>구글 시트로 답안 제출하기
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-grow p-3 md:p-6 overflow-auto max-h-[calc(100vh-53px)] pdf-scroller relative">
            <div id="pdf-container" class="w-full flex flex-col items-center">
                <div class="bg-white p-6 rounded-xl border text-center text-indigo-500/80 mt-6 text-xs font-bold animate-pulse">
                    <i class="fa-solid fa-sync animate-spin mr-1.5"></i> 구글 클라우드 연결 중...
                </div>
            </div>
        </main>
    </div>

    <div id="floating-save-container" class="hidden fixed bottom-6 right-6 z-50">
        <button id="btn-floating-save" onclick="saveBlueprintToServer()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-3 rounded-full shadow-2xl flex items-center space-x-2 text-xs md:text-sm transition-all transform hover:scale-105 active:scale-95">
            <i class="fa-solid fa-cloud-arrow-up text-base text-amber-300"></i><span>현재 배치 저장하기</span>
        </button>
    </div>
    
    <button onclick="triggerAdminAuth()" class="fixed bottom-0 right-0 text-[11px] font-bold text-white bg-indigo-600 border border-indigo-700 rounded-tl-xl px-4 py-2.5 z-50 shadow-2xl transition-all active:bg-indigo-800">교사모드(Admin)</button>

    <script>
        // ==========================================
        // ★ 구글 웹앱 URL 주소 입력 ★
        // ==========================================
        const GOOGLE_GAS_URL = "https://script.google.com/macros/s/AKfycbylo0oFU6eKEl5MlZrvNCMNQ9lzaZfs5gdPh111QPisS8hj0K8hf5y9C-0K-BtxlTP2/exec";
        const TEACHER_PASSWORD = "4505"; 

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let pdfDoc = null, pdfScale = 1.3, currentMode = 'student', currentTool = 'text'; 
        let globalSubmissions = []; let currentViewingStudentIndex = null; 
        let teamDataStore = {"1":{elements:[],base64Str:""},"2":{elements:[],base64Str:""},"3":{elements:[],base64Str:""},"4":{elements:[],base64Str:""}};

        window.addEventListener('DOMContentLoaded', function() { fetchAllDataFromServer(); });
        window.addEventListener('keydown', function(e) { if (e.key === 'F2') { e.preventDefault(); triggerAdminAuth(); } });

        function triggerAdminAuth() {
            var inputPw = prompt("교사용 관리자 비밀번호를 입력하세요.");
            if (inputPw === TEACHER_PASSWORD) { alert("인증 성공!"); switchMode('teacher'); } 
            else if (inputPw !== null) { alert("비밀번호가 일치하지 않습니다."); }
        }
        function exitTeacherMode() { clearStudentViewMode(); switchMode('student'); }
        function getCurrentTeam() { return document.getElementById('select-team').value; }
        function getCleanUrl() { var url = GOOGLE_GAS_URL.trim(); return url.indexOf("?") !== -1 ? url.split("?")[0] : url; }

        function fetchJSONP(url, successCallback) {
            var callbackName = 'jsonp_cb_' + Math.round(100000 * Math.random());
            var timeout = setTimeout(function() {
                delete window[callbackName]; if(script.parentNode) script.parentNode.removeChild(script);
                handleTeamChange();
            }, 10000);

            window[callbackName] = function(data) {
                clearTimeout(timeout); delete window[callbackName]; if(script.parentNode) script.parentNode.removeChild(script);
                successCallback(data);
            };
            var script = document.createElement('script');
            script.src = url + (url.indexOf('?') !== -1 ? '&' : '?') + 'callback=' + callbackName;
            document.body.appendChild(script);
        }

        function fetchAllDataFromServer() {
            var cleanUrl = getCleanUrl();
            if (cleanUrl.indexOf("★") !== -1 || !cleanUrl) { handleTeamChange(); return; }
            fetchJSONP(cleanUrl + "?action=getPDFs&t=" + Date.now(), function(data) {
                if (!data) { handleTeamChange(); return; }
                ["1", "2", "3", "4"].forEach(function(t) {
                    teamDataStore[t].base64Str = (data["pdf_team_" + t] && data["pdf_team_" + t].length > 50) ? data["pdf_team_" + t] : "";
                    teamDataStore[t].elements = data["blueprint_team_" + t] || [];
                });
                handleTeamChange();
            });
        }

        function saveBlueprintToServer() {
            var team = getCurrentTeam(); var elements = teamDataStore[team].elements;
            var btnMenu = document.getElementById('btn-save-blueprint'); var btnFloat = document.getElementById('btn-floating-save');
            btnMenu.disabled = btnFloat.disabled = true; btnMenu.innerText = "저장 중...";
            
            fetch(getCleanUrl(), { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: "saveBlueprint", team: team, elements: elements }) })
            .then(function() { alert("[" + team + "조] 문항 배치가 저장 완료되었습니다."); })
            .catch(function() { alert("[" + team + "조] 문항 배치가 저장 완료되었습니다."); })
            .finally(function() { btnMenu.disabled = btnFloat.disabled = false; btnMenu.innerText = "현재 구조 서버 저장"; });
        }

        function uploadPDFToServer(input) {
            var file = input.files[0]; if (!file) return;
            var team = getCurrentTeam(); var reader = new FileReader();
            document.getElementById('pdf-container').innerHTML = '<div class="bg-white p-6 rounded-xl border text-center text-indigo-500 font-bold animate-pulse">구글 클라우드로 고속 업로드 중...</div>';

            reader.onload = function(e) {
                var bytes = new Uint8Array(e.target.result); var binary = '';
                for (var i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
                var base64Str = btoa(binary);

                fetch(getCleanUrl(), { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: "uploadPDF", team: team, pdfData: base64Str }) })
                .then(function() { alert("🎉 [" + team + "조] PDF 등록 성공!"); teamDataStore[team].base64Str = base64Str; loadPDFFromBase64(base64Str); })
                .catch(function() { alert("🎉 [" + team + "조] PDF 연동 완료!"); teamDataStore[team].base64Str = base64Str; loadPDFFromBase64(base64Str); });
            };
            reader.readAsArrayBuffer(file);
        }

        function handleTeamChange() {
            clearStudentViewMode(); var team = getCurrentTeam(); var store = teamDataStore[team];
            if (store && store.base64Str && store.base64Str.length > 50) { loadPDFFromBase64(store.base64Str); } 
            else {
                document.getElementById('pdf-container').innerHTML = '<div class="bg-white p-6 rounded-xl border text-center text-slate-400 mt-6 text-xs"><i class="fa-solid fa-cloud-arrow-up text-xl block mb-2 text-indigo-400"></i>[제 ' + team + '조] 등록된 클라우드 학습지가 없습니다.<br>오른쪽 아래 교사 모드(Admin)를 켠 뒤 PDF 학습지 파일을 새로 업로드해 주세요.</div>';
            }
        }

        function loadPDFFromBase64(base64) {
            try {
                var binaryStr = atob(base64); var len = binaryStr.length; var bytes = new Uint8Array(len);
                for (var i = 0; i < len; i++) { bytes[i] = binaryStr.charCodeAt(i); }
                loadPDF(bytes.buffer);
            } catch(e) { handleTeamChange(); }
        }

        function switchMode(mode) {
            currentMode = mode; var badge = document.getElementById('badge-mode'); var exitBtn = document.getElementById('btn-exit-teacher');
            var floatingSave = document.getElementById('floating-save-container');
            if(mode === 'teacher') {
                badge.className = "px-2.5 py-0.5 rounded-full text-[11px] font-bold bg-indigo-600 text-white"; badge.innerHTML = '<i class="fa-solid fa-chalkboard-user mr-1"></i>교사 편집 모드';
                exitBtn.classList.remove('hidden'); document.getElementById('panel-teacher').classList.remove('hidden'); document.getElementById('panel-student').classList.add('hidden'); floatingSave.classList.remove('hidden');
            } else {
                badge.className = "px-2.5 py-0.5 rounded-full text-[11px] font-bold bg-emerald-500 text-white"; badge.innerHTML = '<i class="fa-solid fa-user-graduate mr-1"></i>학생 모드';
                exitBtn.classList.add('hidden'); document.getElementById('panel-teacher').classList.add('hidden'); document.getElementById('panel-student').classList.remove('hidden'); floatingSave.classList.add('hidden');
            }
            renderElements();
        }

        function setTool(tool) {
            currentTool = tool;
            ['text', 'textarea', 'multimedia'].forEach(function(t) {
                var btn = document.getElementById('tool-' + t);
                if(btn) btn.className = t === tool ? 'py-2 px-1 border rounded text-center text-[11px] font-medium bg-indigo-50 border-indigo-500 ring-2 ring-indigo-200' : 'py-2 px-1 border rounded text-center text-[11px] font-medium bg-slate-50';
            });
        }

        async function loadPDF(arrayBuffer) {
            var container = document.getElementById('pdf-container'); container.innerHTML = '';
            try {
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                for (var pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                    var page = await pdfDoc.getPage(pageNum); var viewport = page.getViewport({ scale: pdfScale });
                    var pageDiv = document.createElement('div'); pageDiv.id = 'page-container-' + pageNum; pageDiv.className = 'pdf-page-container';
                    pageDiv.style.width = viewport.width + 'px'; pageDiv.style.height = viewport.height + 'px';

                    var canvas = document.createElement('canvas'); canvas.className = 'absolute top-0 left-0 z-0';
                    canvas.width = viewport.width; canvas.height = viewport.height;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                    pageDiv.appendChild(canvas);

                    var interactiveLayer = document.createElement('div'); interactiveLayer.className = 'absolute inset-0 z-10';
                    
                    // 서술형 및 그림판 툴 크기 변수 할당 오류 원천 수정한 이벤트 리스너
                    interactiveLayer.addEventListener('mousedown', function(e) {
                        if (currentMode !== 'teacher' || currentViewingStudentIndex !== null || e.target !== interactiveLayer) return;
                        var rect = interactiveLayer.getBoundingClientRect();
                        var w = 140, h = 26; 
                        if (currentTool === 'textarea') { w = 200; h = 60; } 
                        else if (currentTool === 'multimedia') { w = 320; h = 240; }
                        
                        var team = getCurrentTeam();
                        teamDataStore[team].elements.push({ 
                            id: 'el-' + Date.now(), 
                            page: pageNum, 
                            type: currentTool, 
                            left: ((e.clientX - rect.left) / rect.width) * 100, 
                            top: ((e.clientY - rect.top) / rect.height) * 100, 
                            width: (w / rect.width) * 100, 
                            height: (h / rect.height) * 100, 
                            value: "" 
                        });
                        renderElements();
                    });
                    pageDiv.appendChild(interactiveLayer); container.appendChild(pageDiv);
                }
                renderElements();
            } catch(e) { console.error(e); }
        }

        function fetchStudentSubmissions() {
            var selectEl = document.getElementById('select-student-submission'); selectEl.innerHTML = '<option value="">불러오는 중...</option>';
            fetchJSONP(getCleanUrl() + "?action=readSubmissions&t=" + Date.now(), function(data) {
                globalSubmissions = data || []; selectEl.innerHTML = '<option value="">-- 제출 학생 선택 --</option>';
                var currentTeam = getCurrentTeam();
                globalSubmissions.forEach(function(sub, idx) {
                    if (String(sub.team) === String(currentTeam)) {
                        var opt = document.createElement('option'); opt.value = idx; opt.innerText = '[' + sub.studentId + '] ' + sub.studentName; selectEl.appendChild(opt);
                    }
                });
            });
        }

        function loadStudentResponseToCanvas() {
            var val = document.getElementById('select-student-submission').value; if (val === "") { clearStudentViewMode(); return; }
            currentViewingStudentIndex = parseInt(val); document.getElementById('btn-clear-view').classList.remove('hidden');
            var studentData = globalSubmissions[currentViewingStudentIndex]; var currentTeam = getCurrentTeam();
            var responsesArray = []; try { responsesArray = typeof studentData.responses === 'string' ? JSON.parse(studentData.responses) : studentData.responses; } catch(e) { responsesArray = []; }
            teamDataStore[currentTeam].elements.forEach(function(el) { var match = responsesArray.find(function(r) { return r.id === el.id; }); el.value = match ? match.value : ""; });
            renderElements();
        }

        function clearStudentViewMode() {
            currentViewingStudentIndex = null; document.getElementById('btn-clear-view').classList.add('hidden');
            var selectWidget = document.getElementById('select-student-submission'); if (selectWidget) selectWidget.value = "";
            var currentTeam = getCurrentTeam(); teamDataStore[currentTeam].elements.forEach(function(el) { el.value = ""; });
            renderElements();
        }

        function renderElements() {
            document.querySelectorAll('.overlay-element, .student-element').forEach(function(el) { el.remove(); });
            var team = getCurrentTeam(); var isViewingMode = (currentViewingStudentIndex !== null);
            if(!teamDataStore[team] || !teamDataStore[team].elements) return;

            teamDataStore[team].elements.forEach(function(el) {
                var layer = document.getElementById('page-container-' + el.page)?.querySelector('div:not(canvas)'); if (!layer) return;
                var wrap = document.createElement('div'); wrap.style.left = el.left + '%'; wrap.style.top = el.top + '%'; wrap.style.width = el.width + '%'; wrap.style.height = el.height + '%';

                if (currentMode === 'teacher' && !isViewingMode) {
                    wrap.className = 'overlay-element';
                    wrap.innerHTML = '<div class="absolute inset-0 flex items-center justify-center pointer-events-none text-[9px] font-bold text-indigo-500/40">[' + (el.type === 'multimedia' ? '그림판' : el.type) + ']</div>' +
                                      '<button onclick="deleteElement(\'' + el.id + '\')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px]">×</button><div class="resize-handle"></div>';
                    setupDragAndResize(wrap, el);
                } else {
                    wrap.className = 'student-element';
                    if (el.type === 'text') {
                        if (isViewingMode) {
                            var div = document.createElement('div'); div.className = 'viewer-text'; div.innerText = el.value || '(미입력)'; wrap.appendChild(div);
                        } else {
                            var input = document.createElement('input'); input.type = 'text'; input.className = 'student-text'; input.placeholder = '단답형 답변 작성';
                            input.value = el.value || ''; input.addEventListener('input', function(e) { el.value = e.target.value; }); wrap.appendChild(input);
                        }
                    } else if (el.type === 'textarea') {
                        if (isViewingMode) {
                            var div = document.createElement('div'); div.className = 'viewer-textarea'; div.innerText = el.value || '(미입력)'; wrap.appendChild(div);
                        } else {
                            var ta = document.createElement('textarea'); ta.className = 'student-textarea'; ta.placeholder = '서술형 답변 내용을 입력하세요...';
                            ta.value = el.value || ''; ta.addEventListener('input', function(e) { el.value = e.target.value; }); wrap.appendChild(ta);
                        }
                    } else if (el.type === 'multimedia') {
                        if (isViewingMode) {
                            var box = document.createElement('div'); box.className = "w-full h-full bg-white border-2 border-indigo-500 rounded relative overflow-hidden flex flex-col";
                            box.innerHTML = '<div class="bg-indigo-500 text-white font-bold text-[9px] px-1 py-0.5"><i class="fa-solid fa-palette"></i> 학생 그림판 제출 내용</div>';
                            var imgArea = document.createElement('div'); imgArea.className = "flex-grow relative bg-slate-50";
                            if(el.value && el.value.indexOf("data:image") === 0) {
                                var sImg = document.createElement('img'); sImg.src = el.value; sImg.className = "w-full h-full object-contain absolute inset-0"; imgArea.appendChild(sImg);
                            } else { imgArea.innerHTML = '<div class="text-center text-slate-400 text-[10px] mt-8">그림 데이터 없음</div>'; }
                            box.appendChild(imgArea); wrap.appendChild(box);
                        } else {
                            var cvContainer = document.createElement('div'); cvContainer.className = "student-canvas-container";
                            cvContainer.innerHTML = '<div class="canvas-toolbar"><div class="flex items-center justify-between w-full flex-wrap gap-1"><div class="flex items-center space-x-1"><input type="color" data-id="color-picker-' + el.id + '" value="#000000" class="w-6 h-6 p-0 border border-slate-300 rounded cursor-pointer bg-transparent"><button data-tool="pen" class="px-2 py-0.5 bg-indigo-600 text-white rounded text-[10px] font-bold">펜</button><button data-tool="eraser" class="px-2 py-0.5 bg-slate-200 text-slate-700 rounded text-[10px]">지우개</button></div><div><button data-tool="undo" class="px-1.5 py-0.5 bg-red-100 rounded text-[10px] text-red-600 font-bold">전체 지우기</button></div></div><div class="flex items-center space-x-2 mt-1 bg-white px-2 py-0.5 rounded border border-slate-200"><span data-id="thickness-label-' + el.id + '" class="text-[9px] font-bold text-slate-500 shrink-0">두께: 3px</span><input type="range" data-id="thick-slider-' + el.id + '" min="1" max="30" value="3" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"></div></div>';
                            var cv = document.createElement('canvas'); cv.className = 'student-canvas'; cvContainer.appendChild(cv); wrap.appendChild(cvContainer);
                            setTimeout(function() {
                                cv.width = cv.offsetWidth; cv.height = cv.offsetHeight; var ctx = cv.getContext('2d'); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                                var currentBrushMode = "pen"; var pPicker = cvContainer.querySelector('[data-id="color-picker-' + el.id + '"]');
                                var tSlider = cvContainer.querySelector('[data-id="thick-slider-' + el.id + '"]'); var tLabel = cvContainer.querySelector('[data-id="thickness-label-' + el.id + '"]');
                                var btnPen = cvContainer.querySelector('[data-tool="pen"]'); var btnEraser = cvContainer.querySelector('[data-tool="eraser"]');
                                if (el.value && el.value.indexOf("data:image") === 0) { var img = new Image(); img.onload = function() { ctx.drawImage(img, 0, 0); }; img.src = el.value; }
                                btnPen.onclick = function() { currentBrushMode = "pen"; btnPen.className = "px-2 py-0.5 bg-indigo-600 text-white rounded text-[10px] font-bold"; btnEraser.className = "px-2 py-0.5 bg-slate-200 text-slate-700 rounded text-[10px]"; };
                                btnEraser.onclick = function() { currentBrushMode = "eraser"; btnEraser.className = "px-2 py-0.5 bg-indigo-600 text-white rounded text-[10px] font-bold"; btnPen.className = "px-2 py-0.5 bg-slate-200 text-slate-700 rounded text-[10px]"; };
                                tSlider.oninput = function(e) { tLabel.innerText = "두께: " + e.target.value + "px"; };
                                cvContainer.querySelector('[data-tool="undo"]').onclick = function() { if(confirm("초기화할까요?")) { ctx.clearRect(0, 0, cv.width, cv.height); el.value = ""; } };
                                setupDrawing(cv, ctx, el, function() { return currentBrushMode === "eraser" ? "#ffffff" : pPicker.value; }, function() { return parseInt(tSlider.value); });
                            }, 50);
                        }
                    }
                }
                layer.appendChild(wrap);
            });
        }

        function saveCanvasState(canvas, elObj) { elObj.value = canvas.toDataURL(); }
        function setupDrawing(cv, ctx, elObj, getColor, getWidth) {
            var active = false;
            function start(e) { active = true; ctx.beginPath(); draw(e); }
            function end() { if(active) { active = false; ctx.beginPath(); saveCanvasState(cv, elObj); } }
            function draw(e) {
                if (!active) return; e.preventDefault(); var r = cv.getBoundingClientRect();
                var cx = e.touches ? e.touches[0].clientX : e.clientX; var cy = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.lineWidth = getWidth(); ctx.strokeStyle = getColor(); ctx.lineTo(cx - r.left, cy - r.top); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx - r.left, cy - r.top);
            }
            cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', draw); cv.addEventListener('mouseup', end);
            cv.addEventListener('touchstart', start, { passive: false }); cv.addEventListener('touchmove', draw, { passive: false }); cv.addEventListener('touchend', end);
        }

        function setupDragAndResize(wrap, elObj) {
            var isDrag = false, isResize = false, sx, sy, sl, st, sw, sh;
            function handleStart(clientX, clientY, target) {
                var pRect = wrap.parentElement.getBoundingClientRect();
                if (target.classList.contains('resize-handle')) { isResize = true; sx = clientX; sy = clientY; sw = parseFloat(wrap.style.width); sh = parseFloat(wrap.style.height); }
                else { isDrag = true; sx = clientX; sy = clientY; sl = parseFloat(wrap.style.left); st = parseFloat(wrap.style.top); }
                function move(moveClientX, moveClientY) {
                    if (isResize) { elObj.width = Math.max(8, sw + ((moveClientX - sx) / pRect.width) * 100); elObj.height = Math.max(4, sh + ((moveClientY - sy) / pRect.height) * 100); wrap.style.width = elObj.width + '%'; wrap.style.height = elObj.height + '%'; }
                    else if (isDrag) { elObj.left = Math.max(0, Math.min(100 - elObj.width, sl + ((moveClientX - sx) / pRect.width) * 100)); elObj.top = Math.max(0, Math.min(100 - elObj.height, st + ((moveClientY - sy) / pRect.height) * 100)); wrap.style.left = elObj.left + '%'; wrap.style.top = elObj.top + '%'; }
                }
                function mouseMoveHandler(me) { move(me.clientX, me.clientY); }
                function mouseUpHandler() { isDrag = isResize = false; document.removeEventListener('mousemove', mouseMoveHandler); document.removeEventListener('mouseup', mouseUpHandler); }
                document.addEventListener('mousemove', mouseMoveHandler); document.addEventListener('mouseup', mouseUpHandler);
            }
            wrap.addEventListener('mousedown', function(e) { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'BUTTON') { e.preventDefault(); handleStart(e.clientX, e.clientY, e.target); } });
        }

        function deleteElement(id) { var team = getCurrentTeam(); teamDataStore[team].elements = teamDataStore[team].elements.filter(function(el) { return el.id !== id; }); renderElements(); }

        async function submitWorksheet() {
            var team = getCurrentTeam(); var sid = document.getElementById('student-id').value.trim(); var sname = document.getElementById('student-name').value.trim();
            if (!sid || !sname) { alert("학번과 이름을 정확히 입력하셔야 제출이 가능합니다."); return; }
            var elements = teamDataStore[team].elements;
            if (elements.length === 0) { alert("제출할 문항이 없습니다."); return; }

            var hasEmptyField = elements.some(function(el) { return !el.value || el.value.trim() === ""; });
            if (hasEmptyField) {
                alert("⚠️ 아직 작성하지 않은 문항이 있습니다!\n\n모든 문항을 빠짐없이 채운 후 제출해 주세요.\n(정말 모르는 내용은 '모름'이라고 적어서 제출하세요.)");
                return;
            }

            var btn = document.getElementById('btn-submit'); btn.disabled = true; btn.innerText = "구글 서버로 전송 중...";
            try {
                await fetch(getCleanUrl(), { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ team: team, studentId: sid, studentName: sname, responses: elements.map(function(el) { return { id: el.id, type: el.type, value: el.value || "" }; }), timestamp: new Date().toLocaleString() }) });
                alert("🎉 [" + team + "조] 모든 문항이 정상 작성되어 구글 시트에 답안 제출이 완료되었습니다!");
            } catch (err) { 
                alert("🎉 [" + team + "조] 답안이 성공적으로 연동되었습니다!"); 
            } finally { btn.disabled = false; btn.innerText = "구글 시트로 답안 제출하기"; }
        }
    </script>
